exclude = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".hg",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "node_modules",
  "venv",
]

line-length = 88
fix = true

[format]
# Use `\n` line endings for all files
line-ending = "lf"

[lint]
preview = true
select = ["ALL"]

# Rules we intentionally suppress across the code-base
ignore = [
  "ANN",     # flake8-annotations
  "B006",
  "B008",
  "BLE001",
  "C408",    # unnecessary-collection-call
  "C416",
  "C90",     # mccabe complexity
  "COM",     # flake8-commas
  "CPY001",
  "DJ",      # django
  "DOC201",
  "DOC402",
  "DOC501",
  "DTZ006",
  "D100",    # ignore missing docs
  "D101",
  "D102",
  "D103",
  "D104",
  "D105",
  "D106",
  "D107",
  "D200",
  "D205",
  "D212",
  "D400",
  "D401",
  "D404",
  "D415",
  "EM101",
  "EM102",
  "ERA001",
  "EXE",     # flake8-executable
  "FAST002",
  "FBT001",
  "FBT002",
  "FIX002",  # too-verbose TODOs
  "G004",
  "INP001",
  "N818",
  "PERF401",
  "PGH003",
  "PTH109",
  "PLR0904",
  "PLR0911",
  "PLR0912",
  "PLR0913",
  "PLR0914",
  "PLR0915",
  "PLR0917",
  "PLR1702",
  "PLR2004",
  "PLR6301",
  "PLW0603",
  "PLW1514",
  "PLW1641",
  "RET503",
  "RUF005",
  "S101",
  "S105",
  "S108",
  "S110",
  "S112",
  "S608",
  "SIM105",
  "SIM117",
  "T10",     # debugger
  "T201",
  "TC002",
  "TD001",
  "TD002",
  "TD003",
  "TD004",
  "TID",     # flake8-tidy-imports
  "TRY003",  # verbose exception messages
  "TRY201",
  "TRY300",
  "RUF052",  # used-dummy-variable
]

fixable = ["ALL"]
unfixable = ["F401"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"*.ipynb" = ["I"]
# Tests may white-box internals (access private members) where that is the
# clearest assertion — e.g. unit-testing pure helper functions directly.
"tests/**/*.py" = ["SLF001"]
# data_retrieval: copied from grasp-core, interface compliance kwargs
"src/grasp_agents/data_retrieval/*.py" = ["ARG002", "TC003"]
# tools.py: imports used at runtime by @function_tool Pydantic models
# RUF029: vault tools wrap sync filesystem ops in async for @function_tool
"src/grasp_agents/kits/**/tools.py" = ["TC001", "A002", "RUF029"]
# schemas.py: datetime used at runtime by Pydantic
"src/grasp_agents/kits/**/schemas.py" = ["TC003"]
# retrievers: Mapping used at runtime, xml.etree is safe for our own API responses
"src/grasp_agents/kits/**/retriever.py" = ["TC003", "S405"]
# vault filesystem: Path used at runtime for file operations
"src/grasp_agents/kits/research/vault/filesystem.py" = ["TC003"]
# tests: pytestmark before imports; explicit `!= ""` is clearer in assertions
"tests/kits/**/*.py" = ["E402", "PLC1901", "F841"]
# sandbox tests: uniformly async under a module pytestmark (RUF029); explicit
# `== ""` is clearer in output assertions (PLC1901); Path methods in async test
# bodies are fine on asyncio, not trio (ASYNC240); the Seatbelt tests shell out
# to sandbox-exec to compile-check generated profiles (S404 / S603).
# ASYNC109: fake exec backends mirror the ExecBackend `timeout` contract (same
# rationale as the sandbox module); B903: simple test-double data holders.
"tests/sandbox/**/*.py" = [
  "ASYNC109",
  "ASYNC240",
  "B903",
  "PLC1901",
  "RUF029",
  "S404",
  "S603",
]
# sandbox: `timeout` is part of the cross-boundary ExecBackend contract
# (enforced per-backend: asyncio.wait_for / docker exec / remote API), not an
# asyncio.timeout reinvention — ASYNC109 is a false positive here. S603
# (subprocess call) is the module's entire purpose — running commands under the
# shared SandboxPolicy — so it is suppressed here rather than per-call.
"src/grasp_agents/sandbox/**/*.py" = ["ASYNC109", "S603"]
