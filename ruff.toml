exclude = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".hg",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "node_modules",
  "venv",
  # Demo projects + notebooks: not shipped (excluded from the wheel), not held
  # to library lint standards. litellm_tests.ipynb also trips a ruff-notebook
  # panic (astral-sh/ruff: "Transformed content out of bounds").
  "src/grasp_agents/examples",
]

line-length = 88
fix = true

[format]
# Use `\n` line endings for all files
line-ending = "lf"

[lint]
preview = true
select = ["ALL"]

# Rules we intentionally suppress across the code-base
ignore = [
  "ANN",     # flake8-annotations
  "B006",
  "B008",
  "BLE001",
  "C408",    # unnecessary-collection-call
  "C416",
  "C90",     # mccabe complexity
  "COM",     # flake8-commas
  "CPY001",
  "DJ",      # django
  "DOC201",
  "DOC402",
  "DOC501",
  "DTZ006",
  "D100",    # ignore missing docs
  "D101",
  "D102",
  "D103",
  "D104",
  "D105",
  "D106",
  "D107",
  "D200",
  "D205",
  "D212",
  "D400",
  "D401",
  "D404",
  "D415",
  "EM101",
  "EM102",
  "ERA001",
  "EXE",     # flake8-executable
  "FAST002",
  "FBT001",
  "FBT002",
  "FIX002",  # too-verbose TODOs
  "G004",
  "INP001",
  "N818",
  "PERF401",
  "PGH003",
  "PTH109",
  "PLR0904",
  "PLR0911",
  "PLR0912",
  "PLR0913",
  "PLR0914",
  "PLR0915",
  "PLR0917",
  "PLR1702",
  "PLR2004",
  "PLR6301",
  "PLW0603",
  "PLW1514",
  "PLW1641",
  "RET503",
  "RUF005",
  "S101",
  "S105",
  "S108",
  "S110",
  "S112",
  "S608",
  "SIM105",
  "SIM117",
  "T10",     # debugger
  "T201",
  "TC002",
  "TD001",
  "TD002",
  "TD003",
  "TD004",
  "TID",     # flake8-tidy-imports
  "TRY003",  # verbose exception messages
  "TRY201",
  "TRY300",
  "RUF052",  # used-dummy-variable
]

fixable = ["ALL"]
unfixable = ["F401"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"*.ipynb" = ["I"]
# Tests may white-box internals — private-member access (SLF001) and private
# imports (PLC2701) — where that is the clearest assertion. Test-idiomatic
# patterns, suppressed suite-wide: fixture/hook params are often
# required-but-unused (ARG001/ARG002/ARG005); Path methods in async test
# bodies are fine on asyncio, not trio (ASYNC240); `pytestmark` precedes
# imports (E402); imports local to a test are deliberate (PLC0415); explicit
# `== ""` is clearer in assertions (PLC1901); driving dunders by hand (e.g.
# context managers) is a legitimate test move (PLC2801); suites are uniformly
# async under a module pytestmark even when a body never awaits (RUF029);
# unpack-and-ignore of multi-returns (RUF059); fake credentials in fixtures
# (S106); fake tools must mirror the BaseTool contract's `input` param (A002);
# CamelCase locals holding dynamically-built types (N806); asserting that
# *anything* raises is sometimes exactly the point (B017 / PT011).
"tests/**/*.py" = [
  "A002",
  "ARG001",
  "ARG002",
  "ARG005",
  "ASYNC240",
  "B017",
  "E402",
  "N806",
  "PLC0415",
  "PLC1901",
  "PLC2701",
  "PLC2801",
  "PT011",
  "RUF029",
  "RUF059",
  "S106",
  "SLF001",
  "TC001",
  "TC003",
]
# data_retrieval: copied from grasp-core, interface compliance kwargs
"src/grasp_agents/data_retrieval/*.py" = ["ARG002", "TC003"]
# tools.py: imports used at runtime by @function_tool Pydantic models
# RUF029: vault tools wrap sync filesystem ops in async for @function_tool
"src/grasp_agents/kits/**/tools.py" = ["TC001", "A002", "RUF029"]
# schemas.py: datetime used at runtime by Pydantic
"src/grasp_agents/kits/**/schemas.py" = ["TC003"]
# retrievers: Mapping used at runtime, xml.etree is safe for our own API responses
"src/grasp_agents/kits/**/retriever.py" = ["TC003", "S405"]
# vault filesystem: Path used at runtime for file operations
"src/grasp_agents/kits/research/vault/filesystem.py" = ["TC003"]
# kits tests additionally keep intermediate results for readability (F841)
"tests/kits/**/*.py" = ["F841"]
# ad-hoc probe scripts: env loading precedes imports
"scripts/**/*.py" = ["E402"]
# sandbox tests: the Seatbelt tests shell out to sandbox-exec to validate
# generated profiles (S404 / S603). ASYNC109: fake exec backends mirror the
# ExecBackend `timeout` contract (same rationale as the sandbox module);
# B903: simple test-double data holders.
"tests/sandbox/**/*.py" = [
  "ASYNC109",
  "B903",
  "S404",
  "S603",
]
# sandbox: `timeout` is part of the cross-boundary ExecBackend contract
# (enforced per-backend: asyncio.wait_for / docker exec / remote API), not an
# asyncio.timeout reinvention — ASYNC109 is a false positive here. S603
# (subprocess call) is the module's entire purpose — running commands under the
# shared SandboxPolicy — so it is suppressed here rather than per-call.
"src/grasp_agents/sandbox/**/*.py" = ["ASYNC109", "S603"]
