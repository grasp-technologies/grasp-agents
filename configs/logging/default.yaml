version: 1
disable_existing_loggers: false

formatters:
  simple:
    format: '%(message)s'
  detailed:
    format: '%(asctime)s %(levelname)-7s %(name)s [%(exec_id)s] %(message)s'

handlers:
  fileHandler:
    class: logging.FileHandler
    level: INFO
    formatter: detailed
    mode: 'w'
    filename: 'app.log'
  consoleHandler:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

root:
  level: INFO
  handlers: [fileHandler, consoleHandler]
